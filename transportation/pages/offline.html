<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Kasuku Transits and General Supply</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code text-5xl">Offline</div>
      <h1 class="error-title">You are currently offline</h1>
      <p class="error-desc">Please check your internet connection and try again. Some features may not be available without an internet connection.</p>
      <button onclick="window.location.reload()" class="btn btn-primary p-6" class="justify-center" class="inline-flex">
        <i class="fas fa-redo"></i> Try Again
      </button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
