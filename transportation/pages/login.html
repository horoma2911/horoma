<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kasuku Transits and General Supply</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="../pwa/manifest.json">
  <meta name="theme-color" content="#003333">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">K</div>
        <h1>Kasuku Transits</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" class="form-control" placeholder="admin@kasuku.co.tz" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password <span class="required">*</span></label>
          <input type="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <div class="form-group d-flex align-center justify-between">
          <label class="d-flex align-center gap-2 cursor-pointer">
            <input type="checkbox" checked> Remember me
          </label>
          <a href="#" class="text-primary text-sm font-weight-600">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-full justify-end p-4">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
      <div class="login-footer">
        &copy; 2024 Kasuku Transits and General Supply. All rights reserved.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      Utils.showLoader();
      setTimeout(() => {
        Utils.hideLoader();
        window.location.href = 'pages/dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
